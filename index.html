<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorin Gaile | Portfolio</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="layout">

        <!-- ======================================== sidebar with picture ========================================== -->
        
        <aside class="sidebar">
            <div class="profile-picture">

                        <span class="email-icon"><i class="bi bi-envelope"></i></span>
                        <div>
                            <span class="label">Email</span>
                            <div>
                                <p class="value">loringailedr.pagdanganan@gmail.com</p>
                            </div>
                        </div>
                    </li>
                    <li class="other-contact-item">

                        <span class = "linkedin-icon"><i class="bi bi-linkedin"></i></span>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- ======================================== main content ========================================== -->

        <aside class = "main-content">
            <div class = "main-tabs">
                <nav>
                    <ul class="nav-links">
                        <li class="tab-content"><a href="">About</a></li>

                        <li class="tab-content"><a href="">Projects</a></li>
